name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Generate Keystore (Automatic)
        run: |
          if [ ! -f "release.keystore" ]; then
            keytool -genkey -v -keystore release.keystore -alias release-key -keyalg RSA -keysize 2048 -validity 10000 -storepass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" -keypass "${{ secrets.KEY_PASSWORD || 'android' }}" -dname "CN=ElementBlocks, OU=Galaxy, O=Galaxy, L=Galaxy, S=Galaxy, C=ID"
          fi

      - name: Generate App Icons (Automatic)
        run: |
          if [ -f "logo.png" ]; then
            sudo apt-get install -y imagemagick
            # Force conversion to a clean, standard 32-bit RGBA PNG with 8-bit depth
            convert logo.png -strip -colorspace sRGB -depth 8 PNG32:logo_fixed.png
            
            mkdir -p assets
            cp logo_fixed.png assets/icon-only.png
            cp logo_fixed.png assets/icon-foreground.png
            cp logo_fixed.png assets/icon-background.png
            cp logo_fixed.png assets/splash.png
            cp logo_fixed.png assets/splash-dark.png
            
            npx @capacitor/assets generate --android
            
            # Final safety check: Clean all generated PNGs to ensure AAPT2 compatibility
            find android/app/src/main/res -name "*.png" -exec mogrify -strip {} +
          fi

      - name: Remove corrupt Gradle wrapper
        run: rm -rf android/gradle/wrapper

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK & AAB
        run: |
          cd android
          gradle assembleRelease
          gradle bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}

      - name: Sign APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          # Sign the APK
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" -keypass "${{ secrets.KEY_PASSWORD || 'android' }}" $APK_PATH release-key
          # Find zipalign and run it
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | sort -r | head -n 1)
          $ZIPALIGN -v 4 $APK_PATH element-blocks-release.apk

      - name: Sign AAB
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          # Sign the AAB
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore release.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" -keypass "${{ secrets.KEY_PASSWORD || 'android' }}" $AAB_PATH release-key
          # Rename for clarity
          cp $AAB_PATH element-blocks-release.aab

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: element-blocks-builds
          path: |
            element-blocks-release.apk
            element-blocks-release.aab
